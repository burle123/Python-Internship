{% extends "auth/layout.html" %}

{% block title %}Password Updated{% endblock %}

{% block auth_content %}
<div class="space-y-5">
    <h2 class="text-3xl font-bold">Password updated</h2>
    <p class="text-sm text-slate-600 dark:text-slate-300">You can now sign in with your new password.</p>
    <a href="{% url 'account:login' %}" class="inline-flex rounded-2xl bg-slate-950 px-4 py-3 font-semibold text-white dark:bg-sky-500">Go to sign in</a>
</div>
{% endblock %}

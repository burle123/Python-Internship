{% extends "auth/layout.html" %}

{% block title %}Reset Link Sent{% endblock %}

{% block auth_content %}
<div class="space-y-5">
    <h2 class="text-3xl font-bold">Check the console output</h2>
    <p class="text-sm text-slate-600 dark:text-slate-300">If the email exists, Django has printed a password reset link using the development email backend.</p>
    <a href="{% url 'account:login' %}" class="inline-flex rounded-2xl bg-slate-950 px-4 py-3 font-semibold text-white dark:bg-sky-500">Return to sign in</a>
</div>
{% endblock %}

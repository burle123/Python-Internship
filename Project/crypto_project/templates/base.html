{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Django MVP Boilerplate{% endblock %}</title>
    <script>
        (function () {
            const storedTheme = localStorage.getItem('theme-preference') || 'system';
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const activeTheme = storedTheme === 'system' ? (prefersDark ? 'dark' : 'light') : storedTheme;
            document.documentElement.classList.toggle('dark', activeTheme === 'dark');
            document.documentElement.dataset.theme = storedTheme;
        }());
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
    </script>
</head>
<body class="h-full bg-slate-100 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
    <div class="min-h-full">
        {% if messages %}
            <div class="fixed right-4 top-4 z-50 space-y-2">
                {% for message in messages %}
                    <div class="rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm shadow-lg dark:border-slate-700 dark:bg-slate-900">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        {% block body %}{% endblock %}
    </div>
    <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
